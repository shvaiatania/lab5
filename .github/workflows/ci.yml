name: Python CI

on:
  push:
    branches: ["main", "feature-update-readme"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout repository
       uses: actions/checkout@v4
     - name: Set on Python
       uses: actions/setup-python@v5
       with:
         python-version: "3.11" 
     - name: Run script
       run: python src/app,py
